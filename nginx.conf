server {
  listen 8080;
  server_name _;
  absolute_redirect off;
  server_tokens off;

  root /usr/share/nginx/html;
  index index.html;

  autoindex off;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Resource-Policy "same-origin" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; upgrade-insecure-requests" always;

  location = /health {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location ~ /\. {
    deny all;
  }

  location ~* (^|/)(Dockerfile|README(?:\.[a-z0-9]+)?|.*\.md|.*\.log|.*\.env.*|nginx\.conf|docker-compose\.ya?ml)$ {
    deny all;
  }

  location = /start-digital {
    return 301 /start-digital/;
  }

  location = /start-digital.html {
    return 301 /start-digital/;
  }

  location = /start-digital/ {
    try_files /start-digital.html =404;
  }

  location / {
    try_files $uri $uri/ =404;
  }

  location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|webp|ico)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable" always;
    try_files $uri =404;
  }
}
